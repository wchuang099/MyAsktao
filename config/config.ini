[database]
host = 127.0.0.1
port = 3306

[vms]
ports = 102,103

[yjs]
102 = 0xC216,0x0102
103 = 0xC216,0x0103

[role]
;队长在队列中的索引位置（从0开始）
leader_index = 0

[tasks]
;默认任务链配置
default_chain = login,shimen,bangpai,fuben

[shimen]
;师门任务配置
max_rounds = 10
master_map = 揽仙镇

[bangpai]
;帮派任务配置
max_tasks = 20

[fuben]
;副本任务配置
fuben_type = tianzhu
max_retry = 3

[monitor]
;监控配置
timeout = 300
enable_auto_reconnect = true
